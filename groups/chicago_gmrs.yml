# Chicago-area GMRS repeaters — tones from SSRF vendor tree
# (vendor/OpenGD77_SSRFLite_Generator/ssrf/systems/US/IL/Cook/Chicago/gmrs/chicago_gmrs_repeaters.yml).
#
# Once the SSRF ref resolver is wired, migrate each channel from
# `inline:` to `ssrf_ref: asgn_gmrs_<id>`.

group:
  id: "chicago_gmrs"
  name: "Chicago GMRS"
  purpose: "Chicago-area GMRS repeaters"
  priority: 170
  services: ["gmrs"]
  license: "gmrs"

  channels:
    # asgn_gmrs_evanston_725 — Open, PL 100.0
    - inline:
        short_name: "EV725"
        name: "Evan 725"
        rx_freq_mhz: 462.725
        tx_freq_mhz: 467.725
        mode: "FM"
        bandwidth: "narrow"
        rx_tone: 100.0
        tx_tone: 100.0
        scan: true
        rx_only: false

