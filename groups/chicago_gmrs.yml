# Chicago-area GMRS repeaters — a starter set. Expand from SSRF once
# the ssrf/ subtree is vendored in.

group:
  id: "chicago_gmrs"
  name: "Chicago GMRS"
  purpose: "Chicago-area GMRS repeaters + local simplex"
  priority: 170
  services: ["gmrs"]
  license: "gmrs"

  channels:
    # NSEA Evanston 725 — replace tone with SSRF-sourced value once vendored
    - inline:
        short_name: "EV725"
        name: "Evanston 725"
        rx_freq_mhz: 462.725
        tx_freq_mhz: 467.725
        mode: "FM"
        bandwidth: "narrow"
        rx_tone: 141.3   # TODO verify from SSRF
        tx_tone: 141.3
        scan: true
        rx_only: false

    - inline:
