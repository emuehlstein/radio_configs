# Chicago-area 2m amateur repeaters — tones from SSRF vendor tree
# (vendor/OpenGD77_SSRFLite_Generator/ssrf/systems/US/IL/Cook/Chicago/amateur/).

group:
  id: "chicago_2m_repeaters"
  name: "Chicago 2m"
  purpose: "Chicago-area 2m ham repeaters"
  priority: 160
  services: ["amateur"]
  license: "amateur"

  channels:
    # asgn from ns9rc_repeaters.yml — chain_ns9rc_2m_fm
    # NS9RC 2m Fusion (analog side): RX 147.345, TX 147.945 (+0.6), PL 107.2
    - inline:
        short_name: "NS9RC"
        name: "NS9RC 2m"
        rx_freq_mhz: 147.345
        tx_freq_mhz: 147.945
        mode: "FM"
        bandwidth: "wide"
        rx_tone: 107.2
        tx_tone: 107.2
        scan: true
        rx_only: false

    # asgn from sara_repeaters.yml — chain_ka9hhh_2m_fm
    # SARA (KA9HHH): RX 146.880, TX 146.280 (-0.6), PL 107.2
    - inline:
        short_name: "SARA"
        name: "SARA 2m"
        rx_freq_mhz: 146.880
        tx_freq_mhz: 146.280
        mode: "FM"
        bandwidth: "wide"
        rx_tone: 107.2
        tx_tone: 107.2
        scan: true
        rx_only: false
