$schema: "../../../../../../_schema/ssrf-lite-0.5.3.schema.json"
ssrf_lite_version: "0.5.3"
ssrf_lite:
  sources:
    - name: "SARA – Repeaters"
      url: "https://sararepeater.com/repeaters.php"
      accessed: "2025-09-19"

organizations:
  - id: org_sara
    name: "SARA – Society for the Advancement of Radio Amateurs"

locations:
  - id: loc_chicago_lincoln_park
    name: "Chicago – Lincoln Park (approx)"
    lat: 41.9256
    lon: -87.6493

stations:
  - id: stn_ka9hhh_2m
    call_sign: "KA9HHH"
    organization_id: org_sara
    location_id: loc_chicago_lincoln_park
    service: "amateur"
  - id: stn_ka9hhh_440
    call_sign: "KA9HHH"
    organization_id: org_sara
    location_id: loc_chicago_lincoln_park
    service: "amateur"
  - id: stn_na9pl_uhf
    call_sign: "NA9PL"
    organization_id: org_sara
    location_id: loc_chicago_lincoln_park
    service: "amateur"

antennas:
  - id: ant_sara_vhf
    station_id: stn_ka9hhh_2m
    name: "4-bay Folded Dipole"
  - id: ant_sara_uhf
    station_id: stn_ka9hhh_440
    name: "8-bay Folded Dipole"
  - id: ant_sara_uhf_na9pl
    station_id: stn_na9pl_uhf
    name: "8-bay Folded Dipole"

rf_chains:
  - id: chain_ka9hhh_2m_fm
    station_id: stn_ka9hhh_2m
    antenna_id: ant_sara_vhf
    tx:
      freq_mhz: 146.280
      emission: "16K0F3E"
      bandwidth_khz: 25
    rx:
      freq_mhz: 146.880
    mode:
      type: "FM"
      ctcss_tx_hz: 107.2
      ctcss_rx_hz: 107.2
  - id: chain_ka9hhh_440_fm
    station_id: stn_ka9hhh_440
    antenna_id: ant_sara_uhf
    tx:
      freq_mhz: 449.375
      emission: "16K0F3E"
      bandwidth_khz: 25
    rx:
      freq_mhz: 444.375
    mode:
      type: "FM"
      ctcss_tx_hz: 114.8
      ctcss_rx_hz: 114.8
  - id: chain_na9pl_440_c4fm
    station_id: stn_na9pl_uhf
    antenna_id: ant_sara_uhf_na9pl
    tx:
      freq_mhz: 445.250
      emission: "8K50F7W"
      bandwidth_khz: 12.5
    rx:
      freq_mhz: 440.250
    mode:
      type: "C4FM"
      ctcss_tx_hz: 114.8
      ctcss_rx_hz: 114.8

authorizations:
